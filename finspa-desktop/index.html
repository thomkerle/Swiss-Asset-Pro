<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinSPA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class', theme: { extend: {} } }</script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        window.pdfjsLib = window['pdfjs-dist/build/pdf'];
        window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>

    <style>
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* Sorgt dafür, dass der Scrollbar der App sauber aussieht */
        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(156, 163, 175, 0.5); border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 min-h-screen m-0 overflow-hidden">

    <div id="loading-spinner" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-slate-50 dark:bg-slate-900 transition-opacity duration-300">
        <div class="loader mb-4"></div>
        <h2 class="text-xl font-bold mb-1">FinSPA wird gestartet</h2>
        <p class="text-sm text-slate-500 font-mono" id="loading-text">Initialisiere Umgebung...</p>
    </div>

    <div id="error-overlay" class="hidden"></div>
    
    <div id="app-root" class="w-full h-full hidden absolute inset-0 overflow-auto"></div>

    <script>
        window.__FinSPAModules = {};

        function resolveRelativePath(callingFilePath, targetPath) {
            if (!targetPath.startsWith('.')) return targetPath;
            const dirParts = callingFilePath.split('/'); dirParts.pop();
            const targetParts = targetPath.split('/');
            for (const part of targetParts) {
                if (part === '.' || part === '') continue;
                else if (part === '..') dirParts.pop();
                else dirParts.push(part);
            }
            return dirParts.filter(Boolean).join('/');
        }

        function showDiagnosticError(callingPath, requiredName, resolvedPath) {
            document.getElementById('loading-spinner').classList.add('hidden');
            const overlay = document.getElementById('error-overlay');
            const availableFiles = Object.keys(window.__FinSPAModules);
            const fileListHTML = availableFiles.map(f => `<li class="py-1 px-2 text-xs font-mono text-slate-700 dark:text-slate-300 border-b border-slate-200 dark:border-slate-700 last:border-0">${f}</li>`).join('');
            overlay.innerHTML = `
                <div class="fixed inset-0 bg-slate-900/90 flex items-center justify-center z-[9999] p-4 backdrop-blur-sm">
                    <div class="bg-white dark:bg-slate-900 rounded-xl max-w-lg w-full p-6 text-sm shadow-2xl border border-slate-200 dark:border-slate-700">
                        <h3 class="text-red-600 font-bold text-lg mb-2"><i class="fa-solid fa-triangle-exclamation mr-2"></i>Ladefehler</h3>
                        <p class="mb-4 text-slate-600 dark:text-slate-400">Ein benötigtes Modul konnte in der ZIP-Datei nicht gefunden werden.</p>
                        <div class="bg-slate-100 dark:bg-slate-800 p-3 rounded mb-4 font-mono text-xs text-slate-700 dark:text-slate-300">
                            <span class="text-slate-400">Von:</span> ${callingPath}<br/>
                            <span class="text-slate-400">Gesucht:</span> ${requiredName}<br/>
                            <span class="text-slate-400">Aufgelöst als:</span> ${resolvedPath}
                        </div>
                        <h4 class="font-bold mb-2">Verfügbare Dateien:</h4>
                        <ul class="h-40 overflow-auto bg-slate-50 dark:bg-slate-950 p-2 rounded custom-scrollbar border border-slate-200 dark:border-slate-800">${fileListHTML}</ul>
                        <button onclick="document.getElementById('error-overlay').classList.add('hidden')" class="mt-5 w-full py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg transition-colors">Schliessen</button>
                    </div>
                </div>
            `;
            overlay.classList.remove('hidden');
        }

        function makeRequire(callingPath) {
            return function(name) {
                if (name === 'react') return React;
                if (name === 'react-dom') return ReactDOM;

                let resolvedPath = resolveRelativePath(callingPath, name);
                
                if (!resolvedPath.match(/\.(js|jsx|json)$/)) {
                    if (window.__FinSPAModules[resolvedPath + '.jsx']) resolvedPath += '.jsx';
                    else if (window.__FinSPAModules[resolvedPath + '.js']) resolvedPath += '.js';
                    else if (window.__FinSPAModules[resolvedPath + '.json']) resolvedPath += '.json';
                }

                const mod = window.__FinSPAModules[resolvedPath];
                if (!mod) { showDiagnosticError(callingPath, name, resolvedPath); return null; }

                if (!mod.loaded) {
                    mod.loaded = true;
                    const localRequire = makeRequire(resolvedPath);
                    mod.factory(localRequire, mod, mod.exports);
                }
                return mod.exports;
            };
        }

	// 1. WICHTIG: Zuerst die originalen Node.js-Module laden!
        const fs = require('fs');
        const path = require('path');

        // 2. Danach erst das globale require für die React-App (ZIP) überschreiben
        window.require = makeRequire('index.html');

        // Automatisch starten, sobald das HTML gerendert ist
        window.addEventListener('DOMContentLoaded', async () => {
            const statusText = document.getElementById('loading-text');

            try {
                // 1. ZIP-Datei von der Festplatte lesen
                const zipPath = path.join(__dirname, 'app.zip');
                
                if (!fs.existsSync(zipPath)) {
                    throw new Error("Die Datei 'app.zip' wurde nicht gefunden. Bitte lege sie in denselben Ordner wie diese App.");
                }

                statusText.innerText = "Lese app.zip...";
                const zipBuffer = fs.readFileSync(zipPath);
                
                // 2. ZIP im Speicher entpacken
                const zip = await JSZip.loadAsync(zipBuffer);
                window.__FinSPAModules = {};
                
                const fileNames = Object.keys(zip.files).filter(name => !zip.files[name].dir && (name.endsWith('.js') || name.endsWith('.jsx') || name.endsWith('.json')));
                
                let commonPrefix = "";
                if (fileNames.length > 0) {
                    const firstPath = fileNames[0];
                    const slashIdx = firstPath.indexOf('/');
                    if (slashIdx !== -1) {
                        const potentialPrefix = firstPath.substring(0, slashIdx + 1);
                        if (fileNames.every(p => p.startsWith(potentialPrefix))) commonPrefix = potentialPrefix;
                    }
                }

                // 3. Babel Transpilierung
                for (const relativePath of fileNames) {
                    statusText.innerText = `Kompiliere ${relativePath.split('/').pop()}...`;
                    let content = await zip.file(relativePath).async('string');
                    let factory;
                    
                    if (relativePath.endsWith('.json')) {
                        factory = new Function('require', 'module', 'exports', `module.exports = ${content};`);
                    } else {
                        content = content.replace(/^\s*return\s+(module\.)?exports\s*;?\s*$/gm, '').replace(/return\s+(module\.)?exports\s*;?\s*$/, '');
                        const transpiled = Babel.transform(content, { presets: ['react'] }).code;
                        const wrappedCode = `"use strict";\n${transpiled}\nreturn module.exports;`;
                        factory = new Function('require', 'module', 'exports', wrappedCode);
                    }
                    
                    const cleanPath = relativePath.substring(commonPrefix.length).replace(/^\//, '');
                    window.__FinSPAModules[cleanPath] = { exports: {}, factory: factory, loaded: false };
                }

                // 4. React mounten
                statusText.innerText = "Starte FinSPA...";
                const entryPoint = ['main.jsx', 'App.jsx', 'index.jsx'].find(p => window.__FinSPAModules[p]);

                if (entryPoint) {
                    // Minimaler Timeout, damit das React Rendering nicht den Spinner stottern lässt
                    setTimeout(() => {
                        const loaderEl = document.getElementById('loading-spinner');
                        loaderEl.style.opacity = '0';
                        
                        setTimeout(() => {
                            loaderEl.classList.add('hidden');
                            document.getElementById('app-root').classList.remove('hidden');
                            
                            const rootRequire = makeRequire('index.html');
                            const entryExports = rootRequire(entryPoint);
                            const AppComp = entryExports.default || entryExports; 
                            ReactDOM.createRoot(document.getElementById('app-root')).render(React.createElement(AppComp));
                        }, 300); // Wartet auf CSS Fade-Out
                    }, 200);
                } else {
                    throw new Error("Kein Einstiegspunkt in der ZIP gefunden (main.jsx oder App.jsx).");
                }
            } catch (err) {
                console.error(err); 
                document.getElementById('loading-spinner').innerHTML = `
                    <div class="text-red-500 mb-4 animate-bounce"><i class="fa-solid fa-circle-xmark text-5xl"></i></div>
                    <h2 class="text-xl font-bold mb-2">Fehler beim Start</h2>
                    <p class="text-sm text-slate-500 max-w-md text-center px-4 bg-slate-100 dark:bg-slate-800 py-3 rounded-lg border border-slate-200 dark:border-slate-700">${err.message}</p>
                `;
            }
        });
    </script>
</body>
</html>
